name: Nix Flake Check (Linux only)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: Flake Check (x86_64-linux, not a Brew release gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v11

      - name: Run flake checks
        run: nix flake check --system x86_64-linux
