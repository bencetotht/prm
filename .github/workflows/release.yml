name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          PRM_RELEASE_TAG: ${{ github.ref_name }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Archive release bundle
        env:
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BIN="prm"
          STAGING="dist/${BIN}-${REF_NAME}-${TARGET}"

          mkdir -p "${STAGING}"
          cp "target/${TARGET}/release/${BIN}" "${STAGING}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${STAGING}/"

          tar -czf "${STAGING}.tar.gz" -C dist "$(basename "${STAGING}")"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prm-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prm-*
          merge-multiple: true
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
