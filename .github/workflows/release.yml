name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in vX.Y.Z or X.Y.Z form"
        required: true
        type: string
      publish:
        description: "Publish the release and push updates"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release context
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.vars.outputs.release_version }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      should_publish: ${{ steps.vars.outputs.should_publish }}

    steps:
      - name: Derive release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW_VERSION="${{ inputs.version }}"
            if [[ "${{ inputs.publish }}" == "true" ]]; then
              SHOULD_PUBLISH=true
            else
              SHOULD_PUBLISH=false
            fi
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
            SHOULD_PUBLISH=true
          fi

          if [[ "${RAW_VERSION}" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            RELEASE_VERSION="${BASH_REMATCH[1]}"
            RELEASE_TAG="v${RELEASE_VERSION}"
          else
            echo "Invalid release version: ${RAW_VERSION}" >&2
            exit 1
          fi

          {
            echo "release_version=${RELEASE_VERSION}"
            echo "release_tag=${RELEASE_TAG}"
            echo "should_publish=${SHOULD_PUBLISH}"
          } >> "${GITHUB_OUTPUT}"

  sync-version-files:
    name: Sync version files
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync versioned files
        run: python3 scripts/sync_version.py ${{ needs.prepare.outputs.release_tag }}

      - name: Verify synced files
        run: python3 scripts/sync_version.py --check ${{ needs.prepare.outputs.release_tag }}

      - name: Commit synced files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md
          git commit -m "release: sync ${{ needs.prepare.outputs.release_tag }}"
          git push origin HEAD:main

  build-artifacts:
    name: Build (${{ matrix.label }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux x86_64
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            label: macOS x86_64
            target: x86_64-apple-darwin
          - os: macos-14
            label: macOS arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          PRM_RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Archive release bundle
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="prm"
          STAGING="dist/${BIN}-${RELEASE_VERSION}-${TARGET}"
          ASSET="dist/${BIN}-${RELEASE_TAG}-${TARGET}.tar.gz"

          mkdir -p "${STAGING}"
          cp "target/${TARGET}/release/${BIN}" "${STAGING}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${STAGING}/"

          tar -czf "${ASSET}" -C dist "$(basename "${STAGING}")"
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prm-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  assemble-release-metadata:
    name: Assemble release metadata
    needs:
      - prepare
      - build-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prm-*
          merge-multiple: true
          path: dist

      - name: Collect checksums
        id: checksums
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          linux_sha="$(awk '{print $1}' "dist/prm-${RELEASE_TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256")"
          darwin_x86_64_sha="$(awk '{print $1}' "dist/prm-${RELEASE_TAG}-x86_64-apple-darwin.tar.gz.sha256")"
          darwin_arm64_sha="$(awk '{print $1}' "dist/prm-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz.sha256")"

          cat \
            "dist/prm-${RELEASE_TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256" \
            "dist/prm-${RELEASE_TAG}-x86_64-apple-darwin.tar.gz.sha256" \
            "dist/prm-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz.sha256" \
            > "dist/prm-${RELEASE_TAG}-checksums.txt"

          {
            echo "linux_sha=${linux_sha}"
            echo "darwin_x86_64_sha=${darwin_x86_64_sha}"
            echo "darwin_arm64_sha=${darwin_arm64_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Render Homebrew formula
        run: |
          python3 scripts/render_homebrew_formula.py \
            --version ${{ needs.prepare.outputs.release_version }} \
            --github-owner bencetotht \
            --github-repo prm \
            --template .github/homebrew/prm.rb.template \
            --output dist/prm.rb \
            --linux-x86-64-sha256 ${{ steps.checksums.outputs.linux_sha }} \
            --darwin-x86-64-sha256 ${{ steps.checksums.outputs.darwin_x86_64_sha }} \
            --darwin-arm64-sha256 ${{ steps.checksums.outputs.darwin_arm64_sha }}

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        shell: bash
        run: |
          cat <<EOF > dist/release-notes.md
          ## Install

          \`\`\`bash
          brew install bencetotht/prm/prm
          \`\`\`

          Or:

          \`\`\`bash
          brew tap bencetotht/prm
          brew install prm
          \`\`\`

          ## Supported targets

          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin

          ## Checksums

          Download \`prm-${RELEASE_TAG}-checksums.txt\` for the published SHA256 values.

          ## Notes

          - Formula updates are published to \`bencetotht/homebrew-prm\`.
          - Release binaries are built with embedded version \`${RELEASE_VERSION}\`.
          EOF

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            dist/prm.rb
            dist/prm-${{ needs.prepare.outputs.release_tag }}-checksums.txt
            dist/release-notes.md

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - sync-version-files
      - assemble-release-metadata
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prm-*
          merge-multiple: true
          path: dist

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: |
            dist/*.tar.gz
            dist/prm-${{ needs.prepare.outputs.release_tag }}-checksums.txt
          body_path: dist/release-notes.md
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew tap
    needs:
      - prepare
      - sync-version-files
      - assemble-release-metadata
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: dist

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: bencetotht/homebrew-prm
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p homebrew-tap/Formula
          cp dist/prm.rb homebrew-tap/Formula/prm.rb

      - name: Commit tap update
        shell: bash
        run: |
          set -euo pipefail
          cd homebrew-tap

          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/prm.rb
          git commit -m "prm ${{ needs.prepare.outputs.release_version }}"
          git push origin HEAD
